name: build-desktop

# Builds the installable desktop app:
#   • Windows  → .exe (NSIS) + .msi      (windows-latest)
#   • macOS    → .dmg                     (macos-latest)
# Triggers: push a tag like v1.0.0, or run manually (workflow_dispatch).
# Tagged builds are attached to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            pkg: npm run package:win
          - os: macos-latest
            pkg: npm run package:mac
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: apps/desktop
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json
      - run: npm ci
      - name: Build installers
        run: ${{ matrix.pkg }}
      - name: Upload installers as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ runner.os }}
          path: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.dmg
          if-no-files-found: ignore
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/release/*.exe
            apps/desktop/release/*.msi
            apps/desktop/release/*.dmg
          fail_on_unmatched_files: false

  # Renders the bundled guide (public/guide.html) to a branded PDF and ships it
  # on the Release next to the installers.
  guide-pdf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Render guide → PDF (Playwright/Chromium)
        run: |
          npm init -y >/dev/null 2>&1
          npm i playwright@1.48.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium
          node apps/desktop/scripts/guide-to-pdf.mjs
      - name: Upload guide PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: guide-pdf
          path: WABAG-BureauOrdre-Guide.pdf
      - name: Attach to GitHub Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: WABAG-BureauOrdre-Guide.pdf
          fail_on_unmatched_files: false
