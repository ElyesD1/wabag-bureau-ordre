name: keep-render-awake

# Pings the Render free instance during office hours so it doesn't spin down.
# GitHub cron runs in UTC. Tunisia = UTC+1 (no DST), so:
#   08:00–19:55 Tunisia  ==  07:00–18:55 UTC  →  cron "*/5 7-18 * * *"
on:
  schedule:
    - cron: "*/5 7-18 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping /health/version
        run: |
          URL="https://wabag-bureau-ordre-api.onrender.com/health/version"
          for i in 1 2 3 4; do
            code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 70 "$URL" || echo 000)
            echo "attempt $i → HTTP $code"
            [ "$code" = "200" ] && exit 0
            sleep 15
          done
          echo "::warning::keep-alive ping did not return 200"
          exit 1
